name: CI

on:
  pull_request:
    branches:
      - patches
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ReciptHelper/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./ReciptHelper

      - name: Build project
        working-directory: ./ReciptHelper
        run: npm run build
